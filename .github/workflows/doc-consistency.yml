name: Documentation Consistency

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'backend/peekview/config.py'
      - 'backend/peekview/api/**'
      - 'backend/peekview/cli.py'
      - 'Makefile'
      - 'scripts/**'
      - '**.md'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'backend/peekview/config.py'
      - 'backend/peekview/api/**'
      - 'backend/peekview/cli.py'
      - 'Makefile'
      - 'scripts/**'
      - '**.md'

jobs:
  doc-consistency:
    name: Check Documentation Consistency
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Run documentation consistency check
      run: |
        chmod +x scripts/check_doc_consistency.sh
        bash scripts/check_doc_consistency.sh

    - name: Check for outdated environment variables
      run: |
        # Check for old-style env vars in documentation
        OLD_VARS=$(grep -hE "PEEKVIEW_(DATA_DIR|DB_PATH|HOST|PORT|API_KEY|CORS_ORIGINS|ALLOWED_PATHS)" \
          README.md CLAUDE.md backend/README.md docs/DEPLOYMENT.md docs/DEBUGGING.md docs/process/*.md 2>/dev/null | \
          grep -v "STORAGE__\|SERVER__\|CLEANUP__\|LIMITS__\|LOGGING__" | \
          grep -E "(\||\`).*PEEKVIEW_(DATA_DIR|DB_PATH|HOST|PORT)" || true)

        if [ -n "$OLD_VARS" ]; then
          echo "::error::Found outdated environment variable names:"
          echo "$OLD_VARS" | head -20
          echo ""
          echo "Use PEEKVIEW_STORAGE__DATA_DIR instead of PEEKVIEW_DATA_DIR"
          echo "See docs/process/doc-sync-guide.md for naming conventions"
          exit 1
        fi

    - name: Comment PR on failure
      if: failure() && github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: '## ⚠️ Documentation Consistency Check Failed\n\n' +
                  'Please review and fix the following issues:\n' +
                  '1. Environment variable names should use `__` separator for nested config\n' +
                  '2. See [doc-sync-guide.md](docs/process/doc-sync-guide.md) for details\n\n' +
                  'Run `make check-docs` locally to verify fixes.'
          })

  doc-links:
    name: Check Documentation Links
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Check for broken internal links
      run: |
        # Check markdown links to other .md files
        find docs -name "*.md" -type f | while read file; do
          dir=$(dirname "$file")
          grep -oE '\[([^]]+)\]\(([^)]+\.md)\)' "$file" | while read match; do
            link=$(echo "$match" | grep -oE '\([^)]+\.md\)' | tr -d '()')
            # Handle relative paths
            if [[ "$link" != /* ]]; then
              target="$dir/$link"
            else
              target="$link"
            fi
            if [ ! -f "$target" ]; then
              echo "::warning file=$file::Broken link: $link"
            fi
          done
        done

    - name: Check doc-code sync for config changes
      if: github.event_name == 'pull_request'
      run: |
        # If config.py changed, check if READMEs were updated
        if git diff --name-only HEAD^ HEAD | grep -q "backend/peekview/config.py"; then
          if ! git diff --name-only HEAD^ HEAD | grep -qE "(README\.md|CLAUDE\.md|DEPLOYMENT\.md|DEBUGGING\.md)"; then
            echo "::warning::Config file changed but no documentation updated."
            echo "::warning::Consider updating: README.md, CLAUDE.md, DEPLOYMENT.md, DEBUGGING.md"
          fi
        fi
