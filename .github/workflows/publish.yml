name: Publish to PyPI

on:
  # push vX.Y.Z tag 自动触发（推荐方式）
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  # GitHub Release 发布时触发
  release:
    types: [published]
  # 手动触发（紧急情况）
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 0.1.29)"
        required: false
        type: string

jobs:
  publish:
    name: Build & Publish to PyPI
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # Required for trusted publishing

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend-v3/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ── 发布前检查 ──────────────────────────
      - name: Check version consistency
        run: |
          python3 scripts/doc-sync/update_version_docs.py --check

      - name: Check CHANGELOG
        run: |
          VERSION=$(grep '^version = ' backend/pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          if ! grep -qF "## [$VERSION]" CHANGELOG.md; then
            echo "❌ CHANGELOG.md missing entry for v$VERSION — aborting publish"
            exit 1
          fi
          echo "✅ Publishing v$VERSION"

      # ── 构建前端 ───────────────────────────
      - name: Install frontend dependencies
        run: cd frontend-v3 && npm ci

      - name: Build frontend
        run: cd frontend-v3 && npm run build

      - name: Copy frontend to backend static
        run: |
          rm -rf backend/peekview/static/*
          cp -r frontend-v3/dist/* backend/peekview/static/

      # ── 构建 Python 包 ─────────────────────
      - name: Install build dependencies
        run: pip install build

      - name: Build wheel
        run: cd backend && python3 -m build --wheel

      - name: Verify wheel
        run: cd backend && python3 scripts/verify_wheel.py

      # ── 发布 ───────────────────────────────
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: backend/dist/
